name: Build Windows

on:
  workflow_dispatch:
  push:
    branches: [main, master, feat/*]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download mpv Windows dev package
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "mpv-dev-x86_64.*\.7z" } | Select-Object -First 1
          $url = $asset.browser_download_url
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\mpv.7z"
          7z x "$env:TEMP\mpv.7z" -o"C:\mpv" -y
          echo "MPV_INCLUDE_DIR=C:\mpv\include" >> $env:GITHUB_ENV
          echo "MPV_LIB_DIR=C:\mpv\lib" >> $env:GITHUB_ENV

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Aniplayer-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
